name: CI

on:
  push:
    branches: [main]
  pull_request:

# Fork PRs must never get anything beyond read access.
permissions:
  contents: read

jobs:
  # release-please builds releases from squash-merge commit titles, so PR titles
  # must follow Conventional Commits
  pr-title:
    name: Conventional PR title
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check the PR title follows Conventional Commits
        env:
          # via env, not inline interpolation: titles are untrusted input
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          if ! printf '%s' "$TITLE" | grep -qE '^(feat|fix|docs|refactor|perf|test|build|ci|chore|revert)(\([a-z0-9-]+\))?!?: .+'; then
            echo "::error::PR title must follow Conventional Commits, e.g. 'fix: correct badge count'"
            exit 1
          fi

  checks:
    name: Lint, typecheck, unit tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:unit

  integration:
    name: Integration tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: xvfb-run -a npm run test:integration
        if: runner.os == 'Linux'
      - run: npm run test:integration
        if: runner.os != 'Linux'

  package:
    name: Package VSIX
    runs-on: ubuntu-latest
    needs: [checks]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run package
      - uses: actions/upload-artifact@v7
        with:
          name: repodock-vsix
          path: '*.vsix'
